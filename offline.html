<!DOCTYPE html>
<html lang="en">
<head>
<script>
(function() {
  var saved = localStorage.getItem('wc_theme');
  var isDark = saved === 'dark' ||
    (!saved && matchMedia('(prefers-color-scheme:dark)').matches);
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>You're Offline | TimezoneBudy</title>
<link rel="stylesheet" href="/main.css">
<style>
.offline-wrap{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;}
.offline-icon{font-size:56px;margin-bottom:16px;opacity:.6;}
.offline-wrap h1{font-size:22px;margin-bottom:8px;}
.offline-wrap p{color:var(--clr-text2);font-size:14px;max-width:380px;margin-bottom:20px;}
.retry-btn{padding:10px 24px;background:var(--clr-brand);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;}
</style>
</head>
<body>
<nav class="topnav" aria-label="Main navigation">
  <div class="topnav-inner">
    <a class="logo" href="/"><span>🌍</span><span class="logo-name">World<em>Clock</em></span></a>
  </div>
</nav>
<div class="offline-wrap">
  <div class="offline-icon">📡</div>
  <h1>You're offline</h1>
  <p>This page isn't available without an internet connection. Pages you've already visited may still work from your device's cache.</p>
  <button class="retry-btn" onclick="location.reload()">Try Again</button>
</div>
</body>
</html>
